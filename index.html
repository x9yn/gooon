<!DOCTYPE html>
<html>
<head>
<title>goon-lympics</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="centerBox">

<h1>goonlympics</h1>

<input id="username" placeholder="gooner name">

<br><br>

<button id="startButton">start gooning!</button>

</div>


<div class="modeButtons">
    <button id="lightModeBtn">white mode</button>
    <button id="darkModeBtn">black mode</button>
</div>

<div class="backgroundControls">

<label for="bgUpload" class="bgButtonLabel">change background</label>
<input type="file" id="bgUpload" accept="image/*">

</div>  

<script type="module">

import "./script.js";

document.getElementById("startButton").addEventListener("click", () => {

const name = document.getElementById("username").value.trim();

if(!name){
alert("enter your NAME before you can goon. thanks.");
return;
}

localStorage.setItem("playerName", name);

window.location.href = "game.html";

});

</script>

</body>
</html>
